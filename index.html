<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Portfolio - Welcome to the Adventure!">
  <title>Adventure Awaits! | Portfolio</title>

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@300;400;700&display=swap" rel="stylesheet">

  <!-- Styles -->
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/variables.css">
  <link rel="stylesheet" href="css/global.css">
  <link rel="stylesheet" href="css/intro.css">

  <!-- theme.js is loaded before body to avoid flash of wrong theme -->
  <script src="js/theme.js"></script>
</head>
<body class="intro-page">

  <!-- ========== THEME TOGGLE ========== -->
  <div class="theme-toggle">
    <button id="theme-toggle-btn" aria-label="Toggle day/night" title="Toggle day and night mode">
      <span class="sun-emoji">☀️</span>
      <span class="moon-emoji">🌙</span>
    </button>
  </div>

  <!-- ========== INTRO CONTAINER ========== -->
  <main class="intro-container">

    <!-- Animated Background (clouds, stars) -->
    <div class="bg-elements">
      <div class="cloud cloud-1">☁️</div>
      <div class="cloud cloud-2">☁️</div>
      <div class="cloud cloud-3">☁️</div>

      <div class="star star-1">⭐</div>
      <div class="star star-2">✨</div>
      <div class="star star-3">⭐</div>
      <div class="star star-4">✨</div>
      <div class="star star-5">⭐</div>
    </div>

    <!-- Grass Hills (bottom decoration) -->
    <div class="grass-hills">
      <div class="hill hill-1"></div>
      <div class="hill hill-2"></div>
      <div class="hill hill-3"></div>
    </div>

    <!-- ========== MAIN CONTENT ========== -->
    <div class="intro-content">

      <!-- Welcome Title -->
      <div class="welcome-text">
        <h1 class="adventure-title">🎒 Welcome to my digital playground! 🗡️</h1>
      </div>

      <!-- Hero Illustration -->
      <div class="illustration-wrapper">
        <div class="illustration-frame">
          <img
            src="assets/images/intro-illustration.png"
            alt="Adventure illustration"
            class="intro-illustration"
          >
        </div>
      </div>

      <!-- Tagline -->
      <p class="intro-tagline">Exploring code, building projects, and having fun along the way.</p>

      <!-- Enter Button -->
      <div class="enter-section">
        <button class="enter-button">
          <span class="button-text">Let's Go!</span>
          <span class="button-icon">→</span>
        </button>
        <p class="enter-hint">Click to start the adventure</p>
      </div>

    </div>
    <!-- /MAIN CONTENT -->

    <!-- Floating Decorative Emojis -->
    <div class="floating-emoji emoji-1">🎮</div>
    <div class="floating-emoji emoji-2">🎨</div>
    <div class="floating-emoji emoji-3">💻</div>
    <div class="floating-emoji emoji-4">🎪</div>

  </main>
  <!-- /INTRO CONTAINER -->

  <!-- Scripts -->
  <script src="js/intro.js"></script>
</body>
</html>
